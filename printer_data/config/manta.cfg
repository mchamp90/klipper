# This file contains common pin mappings for the BIGTREETECH Manta E3EZ
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PB12/PB13)".

# See docs/Config_Reference.md for a description of parameters.

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3500
max_z_velocity: 10
max_z_accel: 200

########################################
# X / Y Input Shaping
########################################

[input_shaper]
shaper_type_y: mzv
shaper_freq_y: 34.6

shaper_type_x: ei
shaper_freq_x: 75.4

########################################
# X / Y
########################################

[stepper_x]
step_pin: PA14
dir_pin: !PA10
enable_pin: !PA13
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC4
position_endstop: 0
position_max: 255
position_min: -10
homing_speed: 50

[stepper_y]
step_pin: PC8
dir_pin: !PA15
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PB0
position_endstop: 0
position_max: 228
position_min: -10
homing_speed: 50

########################################
# Dual Z
########################################

[stepper_z]
step_pin: PD2
dir_pin: !PD4
enable_pin: !PD3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 250
homing_speed: 10
second_homing_speed: 4

[stepper_z1]
step_pin: PB7
dir_pin: !PB6
enable_pin: !PB4
microsteps: 16
rotation_distance: 8

########################################
# Extruder
########################################

[extruder]
step_pin: PD5
dir_pin: PD6
enable_pin: !PB3
microsteps: 16
rotation_distance: 7.6
nozzle_diameter: 0.400
filament_diameter: 1.750
pressure_advance: 0.05
pressure_advance_smooth_time: 0.04
max_extrude_only_distance: 200
heater_pin: PB11
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA4
control: pid
pid_Kp: 20.473
pid_Ki: 1.187
pid_Kd: 88.290
min_temp: 0
max_temp: 350

########################################
# Bed
########################################

[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA3
control: pid
pid_Kp: 67.594
pid_Ki: 1.124
pid_Kd: 1016.448
min_temp: 0
max_temp: 130

########################################
# Part Cooling (Dual 5015s on FAN0)
########################################

[fan]
pin: PA8            # FAN0
kick_start_time: 0.5
off_below: 0.1

########################################
# Hotend Heatsink Fan (FAN1)
########################################

[heater_fan hotend_fan]
pin: PB15           # FAN1
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

########################################
# Board / Enclosure Fan (FAN2)
########################################

[temperature_fan board_fan]
pin: PB14           # FAN2
sensor_type: temperature_mcu
control: watermark
max_temp: 60.0
min_temp: 0
target_temp: 40.0
min_speed: 0.3
max_speed: 1.0

########################################
# BLTouch
########################################

[bltouch]
sensor_pin: ^PA6
control_pin: PA7
x_offset: -48
y_offset: 7
z_offset: 1.55

[safe_z_home]
home_xy_position: 165, 130
speed: 80
z_hop: 10
z_hop_speed: 5

########################################
# Bed Mesh
########################################

[bed_mesh]
speed: 120
horizontal_move_z: 10
mesh_min: 10, 20
mesh_max: 207, 220
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10

########################################
# Dual Z gantry alignment
########################################

[z_tilt]
z_positions:
    -35, 117.5
    270, 117.5
points:
    60, 117.5
    255, 117.5
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.01

########################################
# TMC2209
########################################

[tmc2209 stepper_x]
uart_pin: PB8
run_current: 0.60
hold_current: 0.40
stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PC9
run_current: 0.60
hold_current: 0.40
stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: PD0
run_current: 0.65
stealthchop_threshold: 999999

[tmc2209 stepper_z1]
uart_pin: PB5
run_current: 0.65
stealthchop_threshold: 999999

[tmc2209 extruder]
uart_pin: PD1
run_current: 0.80
stealthchop_threshold: 999999

########################################
# Board pins / extras
########################################

[board_pins]
aliases:
    EXP1_1=PC1, EXP1_3=PC3, EXP1_5=PC0, EXP1_7=PA2, EXP1_9=<GND>,
    EXP1_2=PC2, EXP1_4=<RST>, EXP1_6=PA0, EXP1_8=PA1, EXP1_10=<5V>

[exclude_object]
#[adxl345]
#cs_pin: PC15
#spi_software_miso_pin: PC11
#spi_software_mosi_pin: PC12
#spi_software_sclk_pin: PC10